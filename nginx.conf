# Demonic YouTube Downloader — Nginx configuration
# Place at: /etc/nginx/sites-available/demonic-downloader
# Enable: ln -s /etc/nginx/sites-available/demonic-downloader /etc/nginx/sites-enabled/
#
# Replace YOUR_DOMAIN with your actual domain name before using.
# Run certbot after enabling this config:
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Certbot will handle the HTTPS redirect after running certbot --nginx
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # ── SSL — filled in by Certbot ──────────────────────────────
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"  always;
    add_header X-Content-Type-Options   "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Proxy to Node app on port 3003 ──────────────────────────
    location / {
        proxy_pass          http://127.0.0.1:3003;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade      $http_upgrade;
        proxy_set_header    Connection   "upgrade";
        proxy_set_header    Host         $host;
        proxy_set_header    X-Real-IP    $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Large file downloads
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
        proxy_buffering         off;
        client_max_body_size    10m;
    }

    # ── Static assets with cache ────────────────────────────────
    location ~* \.(css|js|woff2?|png|jpg|svg|ico)$ {
        proxy_pass        http://127.0.0.1:3003;
        proxy_cache_valid 200 1d;
        expires           1d;
        add_header Cache-Control "public, immutable";
    }

    # ── File downloads — no buffering ───────────────────────────
    location /api/file/ {
        proxy_pass            http://127.0.0.1:3003;
        proxy_buffering       off;
        proxy_read_timeout    600s;
        proxy_send_timeout    600s;
    }

    access_log /var/log/nginx/demonic-downloader.access.log;
    error_log  /var/log/nginx/demonic-downloader.error.log;
}
